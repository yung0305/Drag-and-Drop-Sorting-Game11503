<!doctype html>
<html lang="zh-Hant">
 <head>
  <meta charset="UTF-8">
  <title>【文特知識王】— 全螢幕劇院版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* === 核心樣式設定 === */
    html, body {
      height: 100%;
      background: #111;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* 舞台設定：改為純滿版，不強制縮放 */
    #stage { 
      overflow: hidden; 
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
    }

    /* 拖曳中的卡片特效 */
    .dragging { 
      pointer-events: none; 
      transform: scale(1.08) rotate(-4deg); 
      transform-origin: center;
      transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999; 
      opacity: 0.95; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    .item-card {
      touch-action: none;
      will-change: transform;
    }
    
    /* 動畫區 */
    @keyframes correctPop { 
      0%{transform:scale(0.8); opacity: 0.5;} 
      50%{transform:scale(1.15);} 
      100%{transform:scale(1); opacity: 1;} 
    }
    .correct-anim { animation: correctPop 400ms cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes zoneGlow {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0); border-color: rgba(255,255,255,1); }
      50% { box-shadow: 0 0 40px 10px rgba(34,197,94,0.4); border-color: rgba(34,197,94,0.8); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); border-color: rgba(255,255,255,1); }
    }
    .zone-glow-anim { animation: zoneGlow 600ms ease-out; }

    @keyframes wrongShake { 
      0%,100%{transform:translateX(0) rotate(0);} 
      20%{transform:translateX(-12px) rotate(-2deg);} 
      40%{transform:translateX(12px) rotate(2deg);} 
      60%{transform:translateX(-8px) rotate(-1deg);} 
      80%{transform:translateX(8px) rotate(1deg);} 
    }
    .wrong-anim { animation: wrongShake 400ms ease-in-out; }

    @keyframes confettiFloat { 0%{transform:translateY(0) rotate(0); opacity:1} 100%{transform:translateY(-200px) rotate(360deg); opacity:0} }

    /* 捲軸美化 */
    .pretty-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
    .pretty-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 999px; }
    .pretty-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 999px; }
    .pretty-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }
  </style>
 </head>
 <body class="antialiased w-screen h-screen">
  
  <div id="stage" class="relative w-full h-full bg-gradient-to-br from-sky-200 via-pink-100 to-amber-100">
    
    <div class="pointer-events-none absolute -top-16 -left-16 w-80 h-80 rounded-full bg-pink-300/30 blur-3xl z-0"></div>
    <div class="pointer-events-none absolute -bottom-10 -right-10 w-96 h-96 rounded-full bg-sky-300/30 blur-3xl z-0"></div>

    <div class="absolute top-0 left-0 right-0 h-24 flex items-center justify-between px-10 z-50">
     <div class="flex items-center gap-4">
      <div id="mainTitle" class="text-white/90 bg-gradient-to-r from-fuchsia-500 to-rose-500 px-5 py-2 rounded-2xl shadow-lg text-3xl font-extrabold tracking-wide">
        【文特知識王】
      </div>
      <div id="scoreBox" class="play-only text-fuchsia-700 bg-white/80 backdrop-blur px-4 py-2 rounded-xl shadow text-2xl font-bold transition-all">
        分數：<span id="score">0</span>
      </div>
      <div id="timerBox" class="play-only text-sky-700 bg-white/80 backdrop-blur px-4 py-2 rounded-xl shadow text-2xl font-bold">
        時間：<span id="timer">00:00</span>
      </div>
      <div id="saveIndicator" class="admin-only hidden text-emerald-700 bg-emerald-100 px-4 py-2 rounded-xl text-xl font-bold opacity-0 transition-opacity">
        已儲存
      </div>
     </div>
     
     <div class="flex items-center gap-2 bg-white/80 backdrop-blur rounded-2xl p-1 shadow-lg">
       <button id="tabPlay" class="px-5 py-2 rounded-xl text-xl font-extrabold text-slate-700 hover:bg-slate-100 data-[active=true]:bg-slate-900 data-[active=true]:text-white transition-colors" data-active="true"> 🎮 開始遊戲 </button> 
       <button id="tabAdmin" class="px-5 py-2 rounded-xl text-xl font-extrabold text-slate-700 hover:bg-slate-100 data-[active=true]:bg-slate-900 data-[active=true]:text-white transition-colors"> ⚙️ 設定後台 </button>
     </div>
    </div>

    <div id="toast" class="pointer-events-none hidden absolute top-28 left-1/2 -translate-x-1/2 z-[60] bg-rose-500 text-white text-3xl font-extrabold px-6 py-3 rounded-2xl shadow-2xl transition-all">
      再試一次！
    </div>

    <div id="playView" class="absolute inset-0 pt-24 flex flex-col z-10">
      
      <div class="px-10 pt-4 flex-1 flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-4 shrink-0">
          <div class="bg-white/80 backdrop-blur rounded-2xl shadow p-1 flex items-center">
            <span class="pl-3 pr-2 text-slate-500 font-bold text-lg">文字大小：</span>
            <button data-size="S" class="size-btn px-4 py-2 rounded-xl text-base font-bold text-slate-700 hover:bg-slate-100 transition-colors">小</button> 
            <button data-size="M" class="size-btn px-4 py-2 rounded-xl text-lg font-bold text-slate-700 hover:bg-slate-100 transition-colors">中</button> 
            <button data-size="L" class="size-btn px-4 py-2 rounded-xl text-xl font-extrabold text-slate-700 hover:bg-slate-100 transition-colors">大</button>
          </div>
          <button id="resetBtn" class="px-5 py-2 rounded-2xl bg-amber-500 hover:bg-amber-600 text-white text-2xl font-extrabold shadow-lg active:scale-[0.98] transition-transform"> 🔄 重玩 </button>
        </div>
        
        <div id="zonesArea" class="w-full flex-1 min-h-[40%] grid gap-6 mb-6"></div>
      </div>

      <div class="h-[45%] min-h-[300px] bg-white/70 backdrop-blur border-t border-white/60 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] relative shrink-0">
        <div class="absolute inset-0 px-10 py-6 overflow-y-auto pretty-scrollbar">
          <div id="itemsTrayInner" class="flex flex-wrap items-start content-start gap-4 pb-10"></div>
        </div>
      </div>
    </div>

    <div id="adminView" class="hidden absolute inset-0 pt-28 pb-8 px-10 z-20">
     <div class="w-full h-full grid grid-cols-[280px_1fr] gap-6">
      <div class="h-full bg-white/80 backdrop-blur rounded-2xl border border-white/60 shadow p-4">
       <div class="text-2xl font-extrabold text-slate-800 mb-3">CMS 控制台</div>
       <nav class="space-y-2">
         <button data-admin-section="zones" class="admin-nav w-full text-left px-4 py-3 rounded-xl font-bold bg-sky-100 text-sky-800 transition-colors">分類區設定</button> 
         <button data-admin-section="items" class="admin-nav w-full text-left px-4 py-3 rounded-xl font-bold hover:bg-slate-100 transition-colors">項目設定</button> 
         <button data-admin-section="settings" class="admin-nav w-full text-left px-4 py-3 rounded-xl font-bold hover:bg-slate-100 transition-colors">系統與備份</button>
       </nav>
      </div>

      <div class="h-full bg-white/70 backdrop-blur rounded-2xl border border-white/60 shadow p-5 overflow-y-auto pretty-scrollbar">
       <section id="cmsZones" class="cms-section">
        <div class="flex items-center justify-between mb-4">
         <h2 class="text-3xl font-extrabold text-sky-700">分類區管理</h2>
         <button id="addZone" class="px-4 py-2 rounded-xl bg-sky-500 hover:bg-sky-600 text-white text-lg font-bold shadow transition-colors">+ 新增分類</button>
        </div>
        <div id="zonesList" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="cmsItems" class="cms-section hidden">
         <div class="flex items-center justify-between mb-4">
          <h2 class="text-3xl font-extrabold text-fuchsia-700">項目管理</h2>
          <button id="addItem" class="px-4 py-2 rounded-xl bg-fuchsia-500 hover:bg-fuchsia-600 text-white text-lg font-bold shadow transition-colors">+ 新增項目</button>
         </div>
         <div id="itemsList" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="cmsSettings" class="cms-section hidden space-y-6">
         <div class="bg-white rounded-2xl border p-6 shadow-sm">
           <h3 class="text-2xl font-bold text-slate-800 mb-4">一般設定</h3>
           <div class="flex items-center gap-4">
             <label class="text-lg font-bold text-slate-700">遊戲名稱：</label>
             <input id="titleInput" type="text" class="flex-1 max-w-md border border-slate-300 focus:border-sky-500 outline-none rounded-xl p-3 text-lg font-bold transition-colors">
           </div>
         </div>

         <div class="bg-white rounded-2xl border p-6 shadow-sm">
           <h3 class="text-2xl font-bold text-slate-800 mb-4">資料備份</h3>
           <div class="flex gap-4">
             <button id="exportBtn" class="px-5 py-3 rounded-xl bg-emerald-500 text-white font-bold hover:bg-emerald-600 shadow transition-colors">📥 下載設定檔 (JSON)</button>
             <label class="px-5 py-3 rounded-xl bg-slate-200 text-slate-700 font-bold hover:bg-slate-300 shadow cursor-pointer transition-colors">
               📤 匯入設定檔
               <input id="importInput" type="file" accept=".json,application/json" class="hidden">
             </label>
             <button id="clearAllBtn" class="px-5 py-3 rounded-xl bg-rose-500 text-white font-bold hover:bg-rose-600 shadow ml-auto transition-colors">⚠️ 清除所有資料</button>
           </div>
           <p class="mt-4 text-slate-500">您可以將設定檔下載備份，換電腦時再匯入即可。</p>
         </div>
        </section>
       </div>
      </div>
    </div>

    <div id="finishModal" class="hidden absolute inset-0 bg-black/40 backdrop-blur-sm z-[70] flex items-center justify-center">
     <div class="bg-white rounded-3xl shadow-2xl p-10 w-[720px] text-center transform transition-transform duration-300 scale-100">
      <div class="text-5xl font-extrabold text-emerald-600 mb-6">🎉 恭喜過關！</div>
      <div class="text-3xl text-slate-700 mb-8 font-bold">
        得分：<span id="finalScore" class="text-fuchsia-600">0</span>　
        時間：<span id="finalTime" class="text-sky-600">00:00</span>
      </div>
      <div class="flex items-center justify-center gap-6">
        <button id="playAgain" class="px-8 py-4 rounded-2xl bg-amber-500 hover:bg-amber-600 text-white text-3xl font-extrabold shadow-lg transition-transform hover:scale-105">再玩一次</button> 
        <button id="closeModal" class="px-8 py-4 rounded-2xl bg-slate-200 hover:bg-slate-300 text-slate-700 text-2xl font-bold shadow transition-colors">關閉</button>
      </div>
     </div>
    </div>

    <div id="confetti" class="pointer-events-none absolute inset-0 overflow-hidden z-[65]"></div>
  </div>

  <script>
    // ===== 1. 基礎工具 =====
    const $ = (s, c=document) => c.querySelector(s);
    const $$ = (s, c=document) => Array.from(c.querySelectorAll(s));
    const uid = () => 'id_' + Math.random().toString(36).slice(2, 9);
    
    // 儲存金鑰 (Local Storage)
    const LS_KEY = 'wtkw_config_v2';
    const LS_STATE = 'wtkw_state_v2';

    // 產生預設圖片 (SVG)
    function sampleSVG(emoji, bg) {
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='150'><rect rx='24' ry='24' width='100%' height='100%' fill='${bg}'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-size='72'>${emoji}</text></svg>`;
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
    }

    // 預設資料
    const defaultConfig = {
      gameTitle: '【文特知識王】', // 新增遊戲名稱預設值
      textSize: 'L',
      zones: [
        { id: uid(), name: '水果', imageData: sampleSVG('🍎', '#ff7a7a') },
        { id: uid(), name: '動物', imageData: sampleSVG('🐶', '#7ad3ff') },
        { id: uid(), name: '交通', imageData: sampleSVG('🚗', '#ffd166') },
      ],
      items: [
        { id: uid(), name: '蘋果', imageData: sampleSVG('🍎', '#ff7a7a'), correctZoneId: null },
        { id: uid(), name: '狗狗', imageData: sampleSVG('🐶', '#7ad3ff'), correctZoneId: null },
        { id: uid(), name: '小汽車', imageData: sampleSVG('🚗', '#ffd166'), correctZoneId: null },
        { id: uid(), name: '香蕉', imageData: sampleSVG('🍌', '#ffe066'), correctZoneId: null },
      ]
    };

    // 遊戲狀態
    const defaultState = {
      mode: 'play',
      score: 0,
      locked: {}, // 已鎖定的項目
      placements: {}, // 放置位置
      timerStart: null,
      elapsed: 0,
      finished: false
    };

    // ===== 2. 資料存取 =====
    function saveConfig() { localStorage.setItem(LS_KEY, JSON.stringify(config)); showSavedPulse(); }
    function saveState() { localStorage.setItem(LS_STATE, JSON.stringify(state)); }
    
    function loadAll() {
      let conf = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
      if (!conf) conf = structuredClone(defaultConfig);
      
      // 相容舊資料，若無遊戲名稱則補上
      if (conf.gameTitle === undefined) conf.gameTitle = '【文特知識王】';
      
      conf.items.forEach(it => {
        if (!it.correctZoneId) {
          const z = conf.zones.find(zz => 
            (zz.name.includes('果') && it.name.includes('蘋')) ||
            (zz.name.includes('動物') && it.name.includes('狗')) ||
            (zz.name.includes('交通') && it.name.includes('車'))
          );
          if (z) it.correctZoneId = z.id;
        }
      });
      
      let st = JSON.parse(localStorage.getItem(LS_STATE) || 'null');
      if (!st) st = structuredClone(defaultState);
      return { conf, st };
    }
    let { conf: config, st: state } = loadAll();


    // ===== 3. 遊戲核心邏輯 =====
    
    function applyGameTitle() {
      $('#mainTitle').textContent = config.gameTitle;
      document.title = config.gameTitle + ' — 全螢幕劇院版';
    }

    // 渲染遊戲畫面
    function renderPlay() {
      applyTextSize(config.textSize);
      applyGameTitle();
      updateScoreUI();
      $('#timer').textContent = formatTime(getElapsed());

      // 渲染分類區
      const zonesArea = $('#zonesArea');
      zonesArea.innerHTML = '';
      const cols = Math.max(2, Math.min(3, config.zones.length)); // 最多3欄
      zonesArea.className = `w-full flex-1 min-h-[40%] grid grid-cols-${cols} gap-6 mb-6`;

      config.zones.forEach(z => {
        const el = document.createElement('div');
        el.className = 'zone bg-white/85 rounded-3xl border-4 border-white shadow-xl p-4 flex flex-col transition-all min-h-0 h-full';
        el.dataset.zoneId = z.id;
        el.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="w-24 h-20 overflow-hidden rounded-2xl bg-white/70 border shrink-0">
              <img src="${z.imageData || ''}" class="w-full h-full object-cover"/>
            </div>
            <div class="zone-title text-slate-800 font-extrabold leading-tight">${z.name}</div>
          </div>
          <div class="mt-3 flex-1 rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50/70 p-3 grid grid-cols-3 gap-3 overflow-y-auto pretty-scrollbar items-start content-start" data-zone-drop></div>
        `;
        zonesArea.appendChild(el);
      });

      // 渲染項目卡片
      const trayInner = $('#itemsTrayInner');
      trayInner.innerHTML = '';
      config.items.forEach(item => {
        if (state.locked[item.id] && state.placements[item.id]) {
          placeItemInZone(item, state.placements[item.id], false);
          return;
        }
        const card = document.createElement('div');
        card.className = 'item-card bg-white rounded-2xl border-2 border-white shadow-lg px-3 py-2 flex items-center gap-3 cursor-grab active:cursor-grabbing hover:scale-[1.02] transition-transform select-none';
        card.style.width = '240px'; 
        card.dataset.itemId = item.id;
        card.innerHTML = `
          <div class="w-24 h-20 overflow-hidden rounded-2xl bg-slate-50 border pointer-events-none shrink-0">
            <img src="${item.imageData || ''}" class="w-full h-full object-cover"/>
          </div>
          <div class="item-name text-slate-800 font-extrabold pointer-events-none">${item.name}</div>
        `;
        trayInner.appendChild(card);
        makeDraggable(card, item);
      });

      checkFinish();
    }

    // 將小圖示放入分類區
    function placeItemInZone(item, zoneId, animate = true) {
      const zone = $(`.zone[data-zone-id="${zoneId}"]`);
      if (!zone) return;
      const drop = zone.querySelector('[data-zone-drop]');
      const mini = document.createElement('div');
      mini.className = `bg-gradient-to-br from-white to-emerald-50 rounded-2xl border-2 border-emerald-200 shadow p-2 flex items-center gap-2 ${animate ? 'correct-anim' : ''}`;
      mini.innerHTML = `
        <div class="w-16 h-14 overflow-hidden rounded-xl bg-white border shrink-0">
          <img src="${item.imageData || ''}" class="w-full h-full object-cover"/>
        </div>
        <div class="text-emerald-700 font-extrabold text-sm sm:text-base leading-tight">${item.name}</div>
      `;
      drop.appendChild(mini);

      if(animate) {
         zone.classList.remove('zone-glow-anim');
         void zone.offsetWidth; // trigger reflow
         zone.classList.add('zone-glow-anim');
      }
    }

    function updateScoreUI() {
      const scoreEl = $('#score');
      scoreEl.textContent = state.score;
      scoreEl.parentElement.classList.add('scale-110', 'text-fuchsia-600');
      setTimeout(() => scoreEl.parentElement.classList.remove('scale-110', 'text-fuchsia-600'), 200);
    }

    // 拖曳功能
    function makeDraggable(card, item) {
      let dragging = false, ghost = null;
      let offsetX = 0, offsetY = 0; 
      
      const onDown = (e) => {
        if (e.target.tagName.toLowerCase() === 'button') return;
        
        dragging = true;
        const pt = getPoint(e);
        const rect = card.getBoundingClientRect();
        
        offsetX = pt.x - rect.left;
        offsetY = pt.y - rect.top;
        
        ghost = card.cloneNode(true);
        ghost.style.position = 'fixed';
        ghost.style.left = (pt.x - offsetX) + 'px';
        ghost.style.top = (pt.y - offsetY) + 'px';
        ghost.style.width = rect.width + 'px';
        ghost.style.height = rect.height + 'px';
        ghost.classList.add('dragging', 'ring-4', 'ring-fuchsia-400');
        document.body.appendChild(ghost);
        
        card.style.opacity = '0.3';
        
        window.addEventListener('mousemove', onMove, {passive: false});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', onUp);
        window.addEventListener('touchend', onUp);
      };

      const onMove = (e) => {
        if (!dragging || !ghost) return;
        e.preventDefault();
        const pt = getPoint(e);
        ghost.style.left = (pt.x - offsetX) + 'px';
        ghost.style.top = (pt.y - offsetY) + 'px';
      };

      const onUp = (e) => {
        if (!dragging) return;
        dragging = false;
        const pt = getPoint(e);
        
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('touchmove', onMove);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('touchend', onUp);
        
        const zone = getZoneUnderPoint(pt.x, pt.y);
        
        if (zone) {
          const zoneId = zone.dataset.zoneId;
          if (item.correctZoneId === zoneId) {
            state.score += 10;
            state.locked[item.id] = true;
            state.placements[item.id] = zoneId;
            updateScoreUI();
            placeItemInZone(item, zoneId, true);
            celebrateAt(pt.x, pt.y);
            card.remove(); 
            checkFinish();
          } else {
            showToast('再試一次！');
            shakeCard(card);
          }
        } else {
          shakeCard(card);
        }

        if (ghost) {
          ghost.remove();
          ghost = null;
        }
        card.style.opacity = '1';
        saveState();
      };

      card.addEventListener('mousedown', onDown);
      card.addEventListener('touchstart', onDown, {passive:false});
    }

    function getPoint(e) { 
      return (e.touches && e.touches.length > 0) 
        ? {x: e.touches[0].clientX, y: e.touches[0].clientY} 
        : (e.changedTouches && e.changedTouches.length > 0) 
          ? {x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY}
          : {x: e.clientX, y: e.clientY}; 
    }
    
    function getZoneUnderPoint(x, y) {
      return $$('.zone').find(z => {
        const r = z.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      });
    }
    
    function shakeCard(card) {
      card.classList.remove('wrong-anim');
      void card.offsetWidth; 
      card.classList.add('wrong-anim');
    }
    
    function showToast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      t.style.transform = 'translate(-50%, 20px)';
      t.style.opacity = '0';
      
      requestAnimationFrame(() => {
        t.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        t.style.transform = 'translate(-50%, 0)';
        t.style.opacity = '1';
      });

      if(t.hideTimeout) clearTimeout(t.hideTimeout);
      t.hideTimeout = setTimeout(() => {
        t.style.transform = 'translate(-50%, -20px)';
        t.style.opacity = '0';
        setTimeout(() => t.classList.add('hidden'), 300);
      }, 1500);
    }

    // ===== 4. 計時器與完成 =====
    let timerInt = null;
    function startTimer() {
      if (timerInt) return;
      if (!state.timerStart) state.timerStart = Date.now() - state.elapsed;
      timerInt = setInterval(() => { $('#timer').textContent = formatTime(getElapsed()); }, 500);
    }
    function stopTimer() { 
      if(timerInt) clearInterval(timerInt); 
      timerInt = null; 
      if(state.timerStart) state.elapsed = getElapsed(); 
    }
    function getElapsed() { return state.timerStart ? Date.now() - state.timerStart : state.elapsed; }
    function formatTime(ms) {
      const sec = Math.floor(ms/1000);
      return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
    }
    
    function checkFinish() {
      const total = config.items.length;
      const done = Object.keys(state.locked).length;
      if (total > 0 && done === total && !state.finished) {
        state.finished = true;
        stopTimer();
        $('#finalScore').textContent = state.score;
        $('#finalTime').textContent = formatTime(getElapsed());
        $('#finishModal').classList.remove('hidden');
        saveState();
      }
    }
    function resetGame() {
      state = structuredClone(defaultState);
      stopTimer();
      $('#timer').textContent = '00:00';
      $('#score').textContent = '0';
      $('#finishModal').classList.add('hidden');
      renderPlay();
      startTimer();
      saveState();
    }

    // ===== 5. 文字大小控制 =====
    function applyTextSize(size) {
      config.textSize = size;
      const map = { 'S':['text-xl','text-xl'], 'M':['text-2xl','text-3xl'], 'L':['text-3xl','text-4xl'] };
      const [itemCls, titleCls] = map[size];
      
      $$('.item-name').forEach(e => { e.className = `item-name font-extrabold text-slate-800 pointer-events-none ${itemCls}`; });
      $$('.zone-title').forEach(e => { e.className = `zone-title font-extrabold text-slate-800 leading-tight ${titleCls}`; });
      
      $$('.size-btn').forEach(b => {
        b.classList.toggle('bg-slate-900', b.dataset.size === size);
        b.classList.toggle('text-white', b.dataset.size === size);
      });
      saveConfig();
    }

    // ===== 6. CMS 後台邏輯 =====
    function renderCMS() {
      renderCMSZones();
      renderCMSItems();
      $('#titleInput').value = config.gameTitle; // 確保每次進後台載入最新標題
    }

    function renderCMSZones() {
      const list = $('#zonesList');
      list.innerHTML = '';
      config.zones.forEach(z => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-3 bg-white p-3 rounded-xl border shadow-sm transition-shadow hover:shadow-md';
        div.innerHTML = `
          <img src="${z.imageData}" class="w-16 h-16 rounded object-cover bg-gray-100 shrink-0 border">
          <div class="flex-1"><input value="${z.name}" class="z-name w-full border border-slate-200 focus:border-sky-400 outline-none rounded p-2 font-bold transition-colors"></div>
          <div class="flex flex-col gap-2">
             <label class="text-xs bg-sky-100 text-sky-700 hover:bg-sky-200 px-3 py-1.5 rounded cursor-pointer text-center font-bold transition-colors">換圖<input type="file" class="hidden z-img" accept="image/*"></label>
             <button class="z-del text-xs bg-rose-100 text-rose-700 hover:bg-rose-200 px-3 py-1.5 rounded font-bold transition-colors">刪除</button>
          </div>
        `;
        div.querySelector('.z-name').oninput = (e) => { z.name = e.target.value; saveConfig(); };
        div.querySelector('.z-img').onchange = (e) => loadImageFile(e.target, d => { z.imageData = d; saveConfig(); renderCMSZones(); });
        div.querySelector('.z-del').onclick = () => {
          if(confirm(`確定刪除分類「${z.name}」？這可能會影響相關項目。`)) {
             config.zones = config.zones.filter(x => x.id !== z.id);
             saveConfig(); renderCMS();
          }
        };
        list.appendChild(div);
      });
    }

    function renderCMSItems() {
      const list = $('#itemsList');
      list.innerHTML = '';
      config.items.forEach(it => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-3 bg-white p-3 rounded-xl border shadow-sm transition-shadow hover:shadow-md';
        const opts = config.zones.map(z => `<option value="${z.id}" ${z.id===it.correctZoneId?'selected':''}>${z.name}</option>`).join('');
        
        div.innerHTML = `
          <img src="${it.imageData}" class="w-16 h-16 rounded object-cover bg-gray-100 shrink-0 border">
          <div class="flex-1 grid gap-2">
            <input value="${it.name}" class="i-name w-full border border-slate-200 focus:border-fuchsia-400 outline-none rounded p-1.5 font-bold transition-colors">
            <select class="i-zone w-full border border-slate-200 outline-none rounded p-1.5 text-sm font-bold text-slate-700 bg-slate-50 cursor-pointer hover:bg-slate-100 transition-colors">${opts}</select>
          </div>
          <div class="flex flex-col gap-2">
             <label class="text-xs bg-fuchsia-100 text-fuchsia-700 hover:bg-fuchsia-200 px-3 py-1.5 rounded cursor-pointer text-center font-bold transition-colors">換圖<input type="file" class="hidden i-img" accept="image/*"></label>
             <button class="i-del text-xs bg-rose-100 text-rose-700 hover:bg-rose-200 px-3 py-1.5 rounded font-bold transition-colors">刪除</button>
          </div>
        `;
        div.querySelector('.i-name').oninput = (e) => { it.name = e.target.value; saveConfig(); };
        div.querySelector('.i-zone').onchange = (e) => { it.correctZoneId = e.target.value; saveConfig(); };
        div.querySelector('.i-img').onchange = (e) => loadImageFile(e.target, d => { it.imageData = d; saveConfig(); renderCMSItems(); });
        div.querySelector('.i-del').onclick = () => {
           if(confirm(`確定刪除項目「${it.name}」？`)) {
             config.items = config.items.filter(x => x.id !== it.id);
             saveConfig(); renderCMSItems();
           }
        };
        list.appendChild(div);
      });
    }

    function loadImageFile(input, cb) {
      const f = input.files[0];
      if(!f) return;
      const fr = new FileReader();
      fr.onload = (e) => cb(e.target.result);
      fr.readAsDataURL(f);
    }

    function loadTextFile(input, cb) {
      const f = input.files[0];
      if(!f) return;
      const fr = new FileReader();
      fr.onload = (e) => cb(e.target.result);
      fr.readAsText(f);
    }

    function showSavedPulse() {
      $('#saveIndicator').style.opacity = '1';
      setTimeout(() => $('#saveIndicator').style.opacity = '0', 800);
    }

    // ===== 7. 初始化與彩帶 =====
    function celebrateAt(x, y) {
      const container = $('#confetti');
      for(let i=0; i<15; i++) {
        const d = document.createElement('div');
        d.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:12px;height:12px;background:hsl(${Math.random()*360},70%,50%);border-radius:2px;pointer-events:none;`;
        const angle = Math.random() * Math.PI * 2;
        const velocity = 50 + Math.random() * 100;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity - 150; 
        
        d.animate([
          {transform:'translate(0,0) rotate(0deg)', opacity:1}, 
          {transform:`translate(${tx}px, ${ty}px) rotate(${Math.random()*360+180}deg)`, opacity:0}
        ], {duration: 800 + Math.random()*400, easing:'ease-out'}).onfinish = () => d.remove();
        container.appendChild(d);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 初始化標題
      applyGameTitle();

      // 設定標題輸入框連動
      $('#titleInput').oninput = (e) => {
        config.gameTitle = e.target.value || '【文特知識王】';
        applyGameTitle();
        saveConfig();
      };

      // 介面切換
      $('#tabPlay').onclick = () => {
        state.mode = 'play';
        $('#playView').classList.remove('hidden'); $('#adminView').classList.add('hidden');
        $('#tabPlay').dataset.active = 'true'; $('#tabAdmin').dataset.active = 'false';
        $$('.play-only').forEach(e=>e.classList.remove('hidden')); $$('.admin-only').forEach(e=>e.classList.add('hidden'));
        renderPlay(); startTimer();
      };
      
      $('#tabAdmin').onclick = () => {
        state.mode = 'admin';
        $('#playView').classList.add('hidden'); $('#adminView').classList.remove('hidden');
        $('#tabPlay').dataset.active = 'false'; $('#tabAdmin').dataset.active = 'true';
        $$('.play-only').forEach(e=>e.classList.add('hidden')); $$('.admin-only').forEach(e=>e.classList.remove('hidden'));
        stopTimer(); renderCMS();
      };

      // 側邊欄導航
      $$('.admin-nav').forEach(btn => btn.onclick = () => {
        $$('.cms-section').forEach(s => s.classList.add('hidden'));
        const sec = btn.dataset.adminSection;
        $(`#cms${sec.charAt(0).toUpperCase()+sec.slice(1)}`).classList.remove('hidden');
        $$('.admin-nav').forEach(b => {
            b.classList.remove('bg-sky-100','text-sky-800'); 
            if(b===btn) b.classList.add('bg-sky-100','text-sky-800');
        });
      });

      // 按鈕功能
      $('#resetBtn').onclick = resetGame;
      $('#playAgain').onclick = resetGame;
      $('#closeModal').onclick = () => $('#finishModal').classList.add('hidden');
      $$('.size-btn').forEach(b => b.onclick = () => applyTextSize(b.dataset.size));
      
      $('#addZone').onclick = () => { config.zones.push({id:uid(), name:'新分類', imageData:''}); saveConfig(); renderCMSZones(); };
      $('#addItem').onclick = () => { config.items.push({id:uid(), name:'新項目', imageData:'', correctZoneId:config.zones[0]?.id}); saveConfig(); renderCMSItems(); };
      
      $('#clearAllBtn').onclick = () => { if(confirm('⚠️ 確定清除所有設定回到預設值？這將無法復原！')) { localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_STATE); location.reload(); }};
      
      $('#exportBtn').onclick = () => {
         const a = document.createElement('a');
         a.href = URL.createObjectURL(new Blob([JSON.stringify(config)], {type:'application/json'}));
         a.download = 'wtkw_backup.json'; a.click();
      };
      
      $('#importInput').onchange = (e) => loadTextFile(e.target, txt => {
         try { 
           config = JSON.parse(txt); 
           saveConfig(); 
           alert('✅ 匯入成功'); 
           renderCMS(); 
           applyGameTitle(); // 匯入後同步更新標題
         } catch(err){
           console.error(err);
           alert('❌ 格式錯誤：這不是有效的設定檔');
         }
         e.target.value = ''; // 清空輸入框
      });

      // 啟動
      if(state.mode === 'play') $('#tabPlay').click(); else $('#tabAdmin').click();
    });
  </script>
 </body>
</html>
